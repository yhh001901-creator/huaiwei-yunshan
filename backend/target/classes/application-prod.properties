# Production Configuration for Alibaba Cloud
server.port=${SERVER_PORT:8083}

# Database Connection using environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:huaiwei-v2}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus.type-aliases-package=com.restaurant.entity

# Logging
logging.level.com.restaurant.mapper=info

# File Upload Path
upload.path=./uploads/dishes/

# Knife4j
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
