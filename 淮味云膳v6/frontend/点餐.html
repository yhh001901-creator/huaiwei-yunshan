<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>暖橙食光 · 点餐UI演示</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #FFF9F5;  /* 全局暖米背景 */
            color: #1F2937;
            padding: 20px 16px 40px;
        }

        /* 模拟手机容器 */
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background-color: #FFF9F5;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* 顶部导航 */
        .header {
            padding: 20px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F97316, #F59E0B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 0.7rem;
            color: #F97316;
            font-weight: 500;
        }
        .cart-icon {
            position: relative;
            background: white;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            color: #F97316;
            font-size: 1.3rem;
        }

        /* 搜索条 */
        .search-bar {
            margin: 16px 20px;
            background: white;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #FFE4D6;
        }
        .search-bar i {
            color: #F97316;
            font-size: 1rem;
        }
        .search-bar input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 0.9rem;
            outline: none;
        }
        .search-bar input::placeholder {
            color: #C7C9CC;
        }

        /* 分类标签横向滚动 */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 20px 16px;
            scrollbar-width: thin;
        }
        .category-chip {
            background: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5C5F66;
            white-space: nowrap;
            border: 1px solid #FFE4D6;
            transition: all 0.2s;
        }
        .category-chip.active {
            background: #F97316;
            color: white;
            border-color: #F97316;
            box-shadow: 0 6px 12px rgba(249,115,22,0.2);
        }

        /* 商品网格 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 8px 20px 30px;
        }

        /* 商品卡片 (纯白卡片) */
        .food-card {
            background: #FFFFFF;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease;
            border: 1px solid #FFEEE6;
        }
        .food-card:hover {
            transform: translateY(-4px);
        }
        .food-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #FFEDE3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .food-info {
            padding: 12px 12px 16px;
        }
        .food-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .food-desc {
            font-size: 0.7rem;
            color: #6B7280;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            color: #F97316;
            font-weight: 800;
            font-size: 1.2rem;
        }
        .price small {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6B7280;
        }

        /* 您喜欢的 3D 橙色按钮 (适配点餐场景微调) */
        .btn-add {
            background: #F97316;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #C2410C;
            transition: all 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-add:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #C2410C;
        }

        /* 底部栏模拟 */
        .bottom-nav {
            background: #FFFFFF;
            border-radius: 32px 32px 0 0;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #FFE4D6;
            margin-top: 8px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #A1A5AD;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .nav-item i {
            font-size: 1.3rem;
        }
        .nav-item.active {
            color: #F97316;
        }

        /* 辅助标签 */
        .badge-hot {
            background: #F59E0B;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 头部 -->
    <div class="header">
        <div class="logo">
            <h1>暖橙食光</h1>
            <p>美味即刻送达</p>
        </div>
        <div class="cart-icon">
            <i class="fas fa-shopping-bag"></i>
            <span style="position: absolute; top: -4px; right: -6px; background: #F97316; color:white; font-size: 10px; border-radius: 20px; padding: 0 5px;">3</span>
        </div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="搜索菜品、餐厅...">
    </div>

    <!-- 分类滑动 -->
    <div class="categories">
        <span class="category-chip active">🔥 热销榜</span>
        <span class="category-chip">🍕 披萨</span>
        <span class="category-chip">🍔 汉堡</span>
        <span class="category-chip">🥗 轻食</span>
        <span class="category-chip">🍣 寿司</span>
        <span class="category-chip">🥤 饮品</span>
    </div>

    <!-- 商品列表 使用橙色调 + 3D按钮 -->
    <div class="menu-grid">
        <!-- 卡片 1 -->
        <div class="food-card">
            <div class="food-img">🍔</div>
            <div class="food-info">
                <div class="food-title"><span>招牌和牛堡</span> <span class="badge-hot">热销</span></div>
                <div class="food-desc">双层芝士+澳洲牛肉</div>
                <div class="price-row">
                    <span class="price">¥38 <small>起</small></span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
        <!-- 卡片 2 -->
        <div class="food-card">
            <div class="food-img">🍕</div>
            <div class="food-info">
                <div class="food-title">意式腊肠披萨</div>
                <div class="food-desc">香肠足量 芝香浓郁</div>
                <div class="price-row">
                    <span class="price">¥56</span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
        <!-- 卡片 3 -->
        <div class="food-card">
            <div class="food-img">🥗</div>
            <div class="food-info">
                <div class="food-title">鸡胸能量碗</div>
                <div class="food-desc">低脂高蛋白 轻食首选</div>
                <div class="price-row">
                    <span class="price">¥32</span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
        <!-- 卡片 4 -->
        <div class="food-card">
            <div class="food-img">🍣</div>
            <div class="food-info">
                <div class="food-title">三文鱼寿司拼</div>
                <div class="food-desc">新鲜厚切 五贯</div>
                <div class="price-row">
                    <span class="price">¥68</span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
        <!-- 卡片 5 增加饮品-->
        <div class="food-card">
            <div class="food-img">🥤</div>
            <div class="food-info">
                <div class="food-title">满杯鲜橙茶</div>
                <div class="food-desc">维C满满 清爽解腻</div>
                <div class="price-row">
                    <span class="price">¥18</span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
        <!-- 卡片 6 -->
        <div class="food-card">
            <div class="food-img">🍟</div>
            <div class="food-info">
                <div class="food-title">脆薯格</div>
                <div class="food-desc">外脆内绵 小食必点</div>
                <div class="price-row">
                    <span class="price">¥12</span>
                    <button class="btn-add"><i class="fas fa-plus"></i> 点餐</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-utensils"></i><span>点餐</span></div>
        <div class="nav-item"><i class="fas fa-search"></i><span>发现</span></div>
        <div class="nav-item"><i class="fas fa-shopping-cart"></i><span>购物车</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>我的</span></div>
    </div>
</div>

<!-- 简单交互模拟（点餐按钮提示） -->
<script>
    const btns = document.querySelectorAll('.btn-add');
    btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('🍽️ 已加入购物车 (演示配色与3D按钮)');
            // 微动效反馈
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => { btn.style.transform = ''; }, 100);
        });
    });
</script>
</body>
</html>
