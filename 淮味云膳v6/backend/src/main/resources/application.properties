# 服务器配置
server.port=8083
server.tomcat.uri-encoding=UTF-8

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/huaiwei-v2?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus配置
mybatis-plus.type-aliases-package=com.restaurant.entity

# 日志配置
logging.level.com.restaurant.mapper=debug

# 错误处理配置
spring.mvc.throw-exception-if-no-handler-found=true

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# 图片存储路径
upload.path=./uploads/dishes/

# Knife4j配置
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
